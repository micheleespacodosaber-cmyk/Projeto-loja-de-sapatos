
{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Pé Confortável Ltda.{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <img src="{% static 'img/logo.png' %}" alt="Logo da Pé Confortável" width="40" class="me-2">
                Pé Confortável
            </a>

            <div class="navbar-nav">
                <a class="nav-link text-white" href="/">Início</a>
                <a class="nav-link text-white" href="/produto/cadastro/">Cadastrar Produto</a>
                <a class="nav-link text-white" href="/produto/lista/">Listar Produtos</a>
                <a class="nav-link text-white" href="/fabricante/cadastro/">Cadastrar Fabricante</a>
                <a class="nav-link text-white" href="/fabricante/lista/">Listar Fabricantes</a>
                <a class="nav-link text-white" href="/login/">Login</a>
                <a class="nav-link text-white" href="/contato/">SAC</a>
            </div>
        </div>
    </nav>

    <main class="container mt-4 flex-grow-1">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-4">
    <img src="{% static 'img/logo.png' %}" alt="Logo da Pé Confortável" width="45" class="mb-2">
    <p class="mb-0">Pé Confortável Ltda.</p>
</footer>

</body>
</html>
