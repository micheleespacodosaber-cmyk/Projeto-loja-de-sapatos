
{% extends 'base.html' %}

{% block title %}Cadastro de Produto{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-body">
                <h1 class="card-title mb-4">Cadastro de Produto</h1>

                <form method="post" id="idFrmCadastroProduto" name="frmCadastroProduto">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="idTxtCodigoProduto" class="form-label">Código</label>
                        <input type="number" class="form-control" id="idTxtCodigoProduto" name="codigo" required>
                    </div>

                    <div class="mb-3">
                        <label for="idTxtNomeProduto" class="form-label">Nome</label>
                        <input type="text" class="form-control" id="idTxtNomeProduto" name="nome" maxlength="70" required>
                    </div>

                    <div class="mb-3">
                        <label for="idTxtPrecoCompraProduto" class="form-label">Preço de compra</label>
                        <input type="number" step="0.01" class="form-control" id="idTxtPrecoCompraProduto" name="preco_compra" required>
                    </div>

                    <div class="mb-3">
                        <label for="idTxtPrecoVendaProduto" class="form-label">Preço de venda</label>
                        <input type="number" step="0.01" class="form-control" id="idTxtPrecoVendaProduto" name="preco_venda" required>
                    </div>

                    <div class="mb-3">
    <label for="idBSelCorProduto" class="form-label">Cor</label>
    <select class="form-select" id="idBSelCorProduto" name="cor" required>
        <option value="">Selecione</option>
        <option value="azul">Azul</option>
        <option value="vermelho">Vermelho</option>
        <option value="verde">Verde</option>
        <option value="amarelo">Amarelo</option>
        <option value="branco">Branco</option>
        <option value="preto">Preto</option>
        <option value="marrom">Marrom</option>
        <option value="rosa">Rosa</option>
        <option value="roxo">Roxo</option>
        <option value="colorido">Colorido</option>
    </select>
</div>

                    <div class="mb-3">
                        <label for="idTxtDataFabricacaoProduto" class="form-label">Data de fabricação</label>
                        <input type="text" class="form-control" id="idTxtDataFabricacaoProduto" name="data_fabricacao" placeholder="dd/mm/aaaa" required>
                    </div>

                    <div class="mb-3">
                        <label for="idTxtImagemProduto" class="form-label">Imagem</label>
                        <input type="text" class="form-control" id="idTxtImagemProduto" name="imagem" maxlength="25" required>
                    </div>

                    <button type="submit" class="btn btn-dark" id="idBtnCadastrarProduto" name="btnCadastrarProduto">
                        Cadastrar
                    </button>

                    <button type="reset" class="btn btn-secondary" id="idBtnLimparProduto" name="btnLimparProduto">
                        Limpar
                    </button>

                    <a href="/" class="btn btn-outline-secondary">Voltar</a>
                </form>

                {% if form.errors %}
                <div class="alert alert-danger mt-3">
                    Verifique os dados informados.
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
