
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Fabricante</title>
</head>
<body>
    <h1>Cadastro de Fabricante</h1>

    <form id="idFrmCadastroFabricante" name="frmCadastroFabricante" method="post">
        {% csrf_token %}

        <p>
            <label for="id_codigo">Código:</label>
            {{ form.codigo }}
        </p>

        <p>
            <label for="id_nome">Nome:</label>
            {{ form.nome }}
        </p>

        <input type="submit" id="idBtnCadastrarFabricante" name="btnCadastrarFabricante" value="Cadastrar">
        <input type="reset" id="idBtnLimparFabricante" name="btnLimparFabricante" value="Limpar">
    </form>
</body>
</html>
