
{% extends 'base.html' %}

{% block title %}Lista de Fabricantes{% endblock %}

{% block content %}
<div class="card shadow-sm">
    <div class="card-body">
        <h1 class="card-title mb-4">Lista de Fabricantes</h1>

        <div class="table-responsive">
            <table class="table table-striped table-bordered">
                <thead class="table-dark">
                    <tr>
                        <th>Código</th>
                        <th>Nome</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    {% for fabricante in fabricantes %}
                    <tr>
                        <td>{{ fabricante.codigo }}</td>
                        <td>{{ fabricante.nome }}</td>
                        <td>
                            <a href="{% url 'fabricante:excluir_fabricante' fabricante.id %}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Tem certeza que deseja excluir este fabricante?');">
                                🗑
                            </a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="3" class="text-center">Nenhum fabricante cadastrado.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

        <a href="/" class="btn btn-secondary">Voltar</a>
    </div>
</div>
{% endblock %}
